<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Результаты — Лаб. №9 Big Data</title>
  <link rel="stylesheet" href="style.css">
  <style>
    @keyframes score-pop{
      0%{transform:scale(.6);opacity:0}
      80%{transform:scale(1.05)}
      100%{transform:scale(1);opacity:1}
    }
    .score-pop{animation:score-pop .8s cubic-bezier(.34,1.56,.64,1) .4s both}
    .breakdown-row{
      display:flex;align-items:center;gap:14px;padding:12px 16px;
      border-bottom:1px solid rgba(255,255,255,.04);
      transition:background .2s;
    }
    .breakdown-row:hover{background:rgba(255,255,255,.02)}
    .breakdown-row:last-child{border-bottom:none}
    .brow-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0}
    .brow-q{flex:1;font-size:.88rem;line-height:1.5;color:var(--text-m)}
    .brow-res{font-size:1.2rem}
    .grade-card{
      background:var(--bg-card);border:2px solid var(--border);
      border-radius:var(--r-lg);padding:28px;text-align:center;
    }
    .tip-card{
      background:rgba(59,130,246,.05);border:1px solid rgba(59,130,246,.2);
      border-radius:var(--r);padding:14px 18px;
      font-size:.88rem;color:var(--text-m);line-height:1.6;margin-top:12px;
    }
    @media print{
      .top-nav,.no-print{display:none!important}
      body{background:#fff!important;color:#000!important}
      .card{border:1px solid #ddd!important;background:#fff!important}
      .score-big,.section-title{color:#1e40af!important}
    }
  </style>
</head>
<body class="page">

<!-- ── TOP NAV ── -->
<nav class="top-nav">
  <a href="index.html" class="nav-brand" style="text-decoration:none">⚡ BigData Lab</a>
  <div class="nav-steps">
    <a href="index.html" class="nav-step done" title="Введение">✓</a>
    <div class="nav-conn"></div>
    <a href="learn.html" class="nav-step done" title="Теория + Практика">✓</a>
    <div class="nav-conn"></div>
    <a href="quiz.html" class="nav-step done" title="Тест">✓</a>
    <div class="nav-conn"></div>
    <div class="nav-step active" title="Результаты">4</div>
  </div>
  <div class="nav-spacer"></div>
</nav>

<div class="container-sm" style="padding-top:36px;padding-bottom:72px">

  <!-- Header -->
  <div style="text-align:center;margin-bottom:36px" class="anim">
    <div class="section-label" style="display:block">Шаг 4 / 4 — Финал</div>
    <h1 class="section-title" style="margin-top:8px">Твои результаты</h1>
  </div>

  <!-- ── SCORE SECTION ── -->
  <div class="card score-pop" style="text-align:center;margin-bottom:24px;padding:36px;border-color:rgba(59,130,246,.3)">
    <!-- SVG circle gauge -->
    <div class="score-wrap">
      <svg viewBox="0 0 180 180">
        <defs>
          <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#8b5cf6"/>
          </linearGradient>
        </defs>
        <circle class="sc-bg" cx="90" cy="90" r="80"/>
        <circle class="sc-fill" cx="90" cy="90" r="80" id="scoreCircle"/>
      </svg>
      <div class="score-overlay">
        <div class="score-big" id="scoreBig" style="color:var(--primary)">—</div>
        <div class="score-denom">из 8</div>
      </div>
    </div>

    <!-- Badges -->
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:18px" id="badgeRow">
    </div>

    <!-- Grade label -->
    <div id="gradeText" style="font-size:1.2rem;font-weight:800;margin-bottom:4px"></div>
    <div id="gradeDesc" style="font-size:.9rem;color:var(--text-m);max-width:400px;margin:0 auto;line-height:1.6"></div>
  </div>

  <!-- ── STATS ROW ── -->
  <div class="grid-3" style="margin-bottom:24px" id="statsRow">
    <div class="card" style="text-align:center">
      <div style="font-size:1.8rem;font-weight:900;color:var(--green)" id="stCorrect">—</div>
      <div style="font-size:.8rem;color:var(--text-m)">правильных</div>
    </div>
    <div class="card" style="text-align:center">
      <div style="font-size:1.8rem;font-weight:900;color:var(--red)" id="stWrong">—</div>
      <div style="font-size:.8rem;color:var(--text-m)">ошибок</div>
    </div>
    <div class="card" style="text-align:center">
      <div style="font-size:1.8rem;font-weight:900;color:var(--cyan)" id="stPct">—</div>
      <div style="font-size:.8rem;color:var(--text-m)">процентов</div>
    </div>
  </div>

  <!-- ── LAB STATUS ── -->
  <div class="card" style="margin-bottom:24px;display:flex;align-items:center;gap:16px" id="labCard">
    <div style="font-size:2rem" id="labIcon">📋</div>
    <div style="flex:1">
      <div style="font-weight:700;margin-bottom:4px" id="labTitle">API Практикум</div>
      <div style="font-size:.87rem;color:var(--text-m)" id="labDesc">Загрузка...</div>
    </div>
    <div id="labBadge"></div>
  </div>

  <!-- ── BREAKDOWN TABLE ── -->
  <div class="card" style="margin-bottom:24px">
    <div style="font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px">
      <span>📊</span> Разбор вопросов
    </div>
    <div id="breakdownList"></div>
    <div id="noQuizYet" style="color:var(--text-d);font-size:.9rem;padding:16px;display:none">
      Тест ещё не пройден. <a href="quiz.html" style="color:var(--primary)">Пройти тест →</a>
    </div>
  </div>

  <!-- ── RECOMMENDATIONS ── -->
  <div class="card" style="margin-bottom:28px" id="recCard">
    <div style="font-weight:700;margin-bottom:14px">💡 Рекомендации</div>
    <div id="recList"></div>
  </div>

  <!-- ── ACTIONS ── -->
  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap" class="no-print">
    <button class="btn btn-outline" onclick="window.print()">🖨️ Распечатать отчёт</button>
    <button class="btn btn-outline" onclick="copyResult()">📋 Скопировать результат</button>
    <a href="quiz.html" class="btn btn-outline">🔄 Повторить тест</a>
    <a href="index.html" class="btn btn-primary">✨ Начать заново</a>
  </div>

  <!-- Copy toast -->
  <div id="copyToast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
    background:var(--green);color:#fff;padding:10px 24px;border-radius:100px;
    font-size:.88rem;font-weight:600;transition:transform .35s ease;z-index:300">
    ✓ Скопировано в буфер
  </div>

</div>

<script>
/* ─────────────────────────────────────────
   QUESTION SHORT LABELS for breakdown
───────────────────────────────────────── */
const Q_SHORT = [
  'Что такое Sentiment Analysis?',
  'Методы Topic Modeling (LDA/NMF)?',
  'NoSQL база данных для неструктурированных данных?',
  'Аббревиатура NER означает?',
  'Apache Spark Streaming — это?',
  'Python-библиотека для NLP?',
  'Data Lake vs Data Warehouse?',
  'Регламент защиты персональных данных ЕС?'
];
const CORRECT_ANS = [1, 2, 2, 1, 2, 3, 1, 2];
const ANS_LABELS = [
  ['Анализ графов','Определение тональности текста','Классификация изображений','Токенизация'],
  ['NER и SVM','MapReduce и HDFS','LDA и NMF','CNN и LSTM'],
  ['MySQL','PostgreSQL','MongoDB','SQLite'],
  ['Network Edge Routing','Named Entity Recognition','Node Embedding','Normalized Extraction'],
  ['Хранение данных','SQL-запросы','Обработка в реальном времени','Классификация изображений'],
  ['Pandas','NumPy','Matplotlib','SpaCy'],
  ['Хранит структурированные таблицы','Хранит сырые данные в исходном формате','Инструмент визуализации','Работает только с SQL'],
  ['HIPAA','PCI DSS','GDPR','ISO 27001']
];

/* ─────────────────────────────────────────
   LOAD DATA from localStorage
───────────────────────────────────────── */
window.addEventListener('load', () => {
  const score   = parseInt(localStorage.getItem('quizScore') ?? '-1');
  const total   = parseInt(localStorage.getItem('quizTotal') ?? '11');
  const pct     = parseInt(localStorage.getItem('quizPct')   ?? '0');
  const labDone = localStorage.getItem('labDone') === '1';
  const answers = JSON.parse(localStorage.getItem('quizAnswers') ?? 'null');
  const quizDone = localStorage.getItem('quizDone') === '1';

  // ── Lab status
  const labIcon  = document.getElementById('labIcon');
  const labTitle = document.getElementById('labTitle');
  const labDesc  = document.getElementById('labDesc');
  const labBadge = document.getElementById('labBadge');
  if (labDone) {
    labIcon.textContent = '✅';
    labTitle.textContent = 'API Практикум — выполнен!';
    labDesc.textContent  = 'Все 3 задания: users.get, friends.get, groups.get — пройдены успешно';
    labBadge.innerHTML   = '<span class="badge badge-blue">🏅 API Developer</span>';
    document.getElementById('labCard').style.borderColor = 'rgba(16,185,129,.3)';
  } else {
    labTitle.textContent = 'API Практикум';
    labDesc.textContent  = 'Не все задания выполнены. Вернись к практике.';
    labBadge.innerHTML   = '<a href="learn.html" class="btn btn-outline" style="font-size:.8rem;padding:8px 16px">Выполнить</a>';
  }

  // ── Quiz not done yet
  if (!quizDone || score < 0) {
    document.getElementById('scoreBig').textContent = '?';
    document.getElementById('gradeText').textContent = 'Тест не пройден';
    document.getElementById('gradeDesc').textContent = 'Пройди тест, чтобы увидеть результат.';
    document.getElementById('noQuizYet').style.display = 'block';
    document.getElementById('stCorrect').textContent = '—';
    document.getElementById('stWrong').textContent   = '—';
    document.getElementById('stPct').textContent     = '—';
    renderRecs(null, labDone);
    return;
  }

  // ── Fill score circle
  const pctNum = score / total;
  const circumference = 2 * Math.PI * 80; // r=80
  const offset = circumference * (1 - pctNum);
  setTimeout(() => {
    document.getElementById('scoreCircle').style.strokeDasharray  = circumference;
    document.getElementById('scoreCircle').style.strokeDashoffset = offset;
  }, 300);

  // ── Score text
  document.getElementById('scoreBig').textContent = score;

  // ── Stats
  document.getElementById('stCorrect').textContent = score;
  document.getElementById('stWrong').textContent   = total - score;
  document.getElementById('stPct').textContent     = pct + '%';

  // ── Grade info + badges
  let gradeText, gradeDesc, badgeHTML, scoreColor;
  if (pct >= 88) {
    gradeText  = '🏆 Отлично!'; gradeDesc = 'Блестящее владение материалом. Ты готов к работе с реальными Big Data проектами!';
    badgeHTML  = '<span class="badge badge-gold">🥇 Big Data Master</span><span class="badge badge-blue">📊 Analytics Pro</span>';
    scoreColor = 'var(--green)';
    if (labDone) badgeHTML += '<span class="badge badge-blue">🏅 API Developer</span>';
  } else if (pct >= 63) {
    gradeText  = '🎯 Хорошо!'; gradeDesc = 'Хорошее понимание темы. Повтори несколько концепций для уверенного результата.';
    badgeHTML  = '<span class="badge badge-silver">🥈 Data Analyst</span>';
    scoreColor = 'var(--cyan)';
  } else if (pct >= 38) {
    gradeText  = '📚 Удовлетворительно'; gradeDesc = 'Базовые знания есть, но стоит повторить теорию более детально.';
    badgeHTML  = '<span class="badge badge-bronze">🥉 Learner</span>';
    scoreColor = 'var(--amber)';
  } else {
    gradeText  = '💪 Нужно повторить'; gradeDesc = 'Рекомендуем вернуться к теоретической части и пройти тест снова.';
    badgeHTML  = '<span class="badge badge-red">📖 Study More</span>';
    scoreColor = 'var(--red)';
  }

  document.getElementById('gradeText').textContent = gradeText;
  document.getElementById('gradeText').style.color = scoreColor;
  document.getElementById('gradeDesc').textContent = gradeDesc;
  document.getElementById('scoreBig').style.color  = scoreColor;
  document.getElementById('badgeRow').innerHTML    = badgeHTML;

  // ── Breakdown
  if (answers && answers.length > 0) {
    const list = document.getElementById('breakdownList');
    answers.forEach((a, i) => {
      const row = document.createElement('div');
      row.className = 'breakdown-row';
      const colorNum = a.correct ? 'rgba(16,185,129,.15)' : 'rgba(239,68,68,.12)';
      const textNum  = a.correct ? 'var(--green)' : 'var(--red)';
      const icon     = a.correct ? '✅' : '❌';

      let answerText = '';
      if (!a.correct) {
        const correct = ANS_LABELS[a.q] ? ANS_LABELS[a.q][CORRECT_ANS[a.q]] : '';
        answerText = `<div style="font-size:.78rem;color:var(--green);margin-top:3px">→ Правильно: ${correct}</div>`;
      }

      row.innerHTML = `
        <div class="brow-num" style="background:${colorNum};color:${textNum}">${i+1}</div>
        <div class="brow-q">
          ${Q_SHORT[a.q] || 'Вопрос ' + (a.q+1)}
          ${answerText}
        </div>
        <div class="brow-res">${icon}</div>
      `;
      list.appendChild(row);
    });
  } else {
    document.getElementById('noQuizYet').style.display = 'block';
  }

  renderRecs(pct, labDone);
});

/* ── RECOMMENDATIONS ── */
function renderRecs(pct, labDone) {
  const recs = document.getElementById('recList');
  const tips = [];

  if (pct !== null && pct < 75) {
    tips.push({ icon: '📖', text: 'Повтори вкладку <b>«Методы анализа»</b> — там Sentiment Analysis, LDA, NER', link: 'learn.html' });
    tips.push({ icon: '⚙️', text: 'Изучи инструменты: разбери Apache Spark и Python-библиотеки для NLP', link: 'learn.html' });
  }
  if (!labDone) {
    tips.push({ icon: '💻', text: 'Выполни все 3 задания в API-практикуме (users.get, friends.get, groups.get)', link: 'learn.html' });
  }
  if (pct !== null && pct < 50) {
    tips.push({ icon: '🔄', text: 'Пройди тест повторно после изучения материала — у тебя получится! ', link: 'quiz.html' });
  }
  if (tips.length === 0) {
    tips.push({ icon: '🌟', text: 'Отличная работа! Можешь исследовать тему глубже — изучи NetworkX и построй граф своих друзей ВКонтакте.', link: null });
    tips.push({ icon: '🔬', text: 'Попробуй реальный Sentiment Analysis с библиотекой <b>Dostoevsky</b> для русского языка', link: null });
  }

  tips.forEach(t => {
    const div = document.createElement('div');
    div.className = 'tip-card';
    div.innerHTML = `${t.icon} ${t.text}${t.link ? ` — <a href="${t.link}" style="color:var(--primary)">перейти →</a>` : ''}`;
    recs.appendChild(div);
  });
}

/* ── COPY RESULT ── */
function copyResult() {
  const score = localStorage.getItem('quizScore') ?? '?';
  const pct   = localStorage.getItem('quizPct')   ?? '?';
  const lab   = localStorage.getItem('labDone') === '1' ? 'Выполнена' : 'Не выполнена';
  const text  = `Лабораторная работа №9 — Анализ социальной сети (Big Data)\n──────────────────────────────\nТест: ${score}/8 (${pct}%)\nAPI Практикум: ${lab}\nДата: ${new Date().toLocaleDateString('ru')}`;

  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('copyToast');
    toast.style.transform = 'translateX(-50%) translateY(0)';
    setTimeout(() => { toast.style.transform = 'translateX(-50%) translateY(80px)'; }, 2500);
  });
}
</script>
</body>
</html>
